name: Build and publish images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/magicfun1241/vtuber

jobs:
  build-tts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: tts
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/tts:${{ github.sha }}
            ${{ env.IMAGE_BASE }}/tts:latest

  build-whisper:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: whisper
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/whisper:${{ github.sha }}
            ${{ env.IMAGE_BASE }}/whisper:latest
