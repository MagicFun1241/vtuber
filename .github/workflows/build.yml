name: Build and publish images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-tts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: tts
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/tts:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/tts:latest

  build-whisper:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: whisper
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/whisper:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/whisper:latest
